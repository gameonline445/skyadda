<!DOCTYPE html>
<html>

<head>

<title>ADMIN PANEL</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
text-align:center;
}

.top{
background:black;
padding:25px;
font-size:40px;
font-weight:bold;
border-bottom:3px solid yellow;
}

.box{
background:#1e1e1e;
margin:30px;
padding:30px;
border-radius:25px;
box-shadow:0 0 20px rgba(255,255,255,0.1);
}

input{
width:90%;
padding:18px;
font-size:22px;
margin-top:20px;
border:none;
border-radius:15px;
outline:none;
}

button{
padding:18px 40px;
font-size:24px;
margin-top:25px;
border:none;
border-radius:15px;
background:#00cfff;
color:white;
font-weight:bold;
}

#status{
margin-top:25px;
font-size:24px;
color:#00ff99;
}

</style>

</head>

<body>

<div class="top">

👨‍💼 ADMIN PANEL

</div>

<div class="box">

<h1>Add Wallet Balance</h1>

<input
type="text"
id="userid"
placeholder="Enter User UID">

<input
type="number"
id="money"
placeholder="Enter Amount">

<button onclick="addMoney()">

ADD MONEY

</button>

<div id="status"></div>

</div>

<script>

function addMoney(){

let uid =
document.getElementById("userid").value;

let money =
document.getElementById("money").value;

if(uid == "" || money == ""){

document.getElementById("status")
.innerHTML =
"❌ Fill All Fields";

return;

}

document.getElementById("status")
.innerHTML =
"✅ Money Added Successfully";

}

</script>

</body>

</html>
