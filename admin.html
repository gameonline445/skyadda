<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.top{
background:black;
padding:20px;
font-size:35px;
font-weight:bold;
}

.box{
background:#1e1e1e;
margin:20px;
padding:20px;
border-radius:20px;
font-size:20px;
line-height:40px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:12px;
background:#00cfff;
color:white;
font-weight:bold;
margin-top:15px;
}

</style>

</head>

<body>

<div class="top">

👨‍💼 ADMIN PANEL

</div>

<div id="requests">

Loading...

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
doc,
getDoc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBNnnLu7HpCImLl5cIWKmB_eLjsbaR6zxg",

authDomain: "skyadda-1d849.firebaseapp.com",

projectId: "skyadda-1d849",

storageBucket: "skyadda-1d849.firebasestorage.app",

messagingSenderId: "929894889505",

appId: "1:929894889505:web:6e76e0eb701ffe89d60b60"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const requestBox =
document.getElementById("requests");

async function loadRequests(){

const querySnapshot =
await getDocs(
collection(db,"depositRequests")
);

requestBox.innerHTML = "";

querySnapshot.forEach((item)=>{

const data = item.data();

requestBox.innerHTML += `

<div class="box">

🆔 UID:
<br>
${data.uid}

<br><br>

💰 Amount:
₹${data.amount}

<br><br>

🧾 UTR:
${data.utr}

<br><br>

📌 Status:
${data.status}

<br>

<button
onclick="approveMoney('${data.uid}',${data.amount})">

ADD MONEY

</button>

</div>

`;

});

}

loadRequests();

window.approveMoney =
async function(uid,amount){

const userRef =
doc(db,"users",uid);

const snap =
await getDoc(userRef);

if(snap.exists()){

const data = snap.data();

let currentMoney =
data.money || 0;

await updateDoc(userRef,{

money:
currentMoney + Number(amount)

});

alert("✅ Money Added");

location.reload();

}

}

</script>

</body>

</html>
