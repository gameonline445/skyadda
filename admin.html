<!DOCTYPE html>
<html>

<head>

<title>Secure Admin Panel</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
padding:15px;
}

.top{
font-size:35px;
font-weight:bold;
text-align:center;
padding:20px;
background:black;
border-radius:20px;
}

.card{
background:#1c1c1c;
padding:20px;
margin-top:20px;
border-radius:20px;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:20px;
font-weight:bold;
margin-top:15px;
color:white;
}

.approve{
background:green;
}

.failed{
background:red;
}

.time{
color:#aaa;
margin-top:10px;
font-size:15px;
}

</style>

</head>

<body>

<script>

const adminPassword = "12345";

const enteredPassword =
prompt("Enter Admin Password");

if(enteredPassword != adminPassword){

alert("❌ Wrong Password");

window.location.href =
"index.html";

}

</script>

<div class="top">

👨‍💼 SECURE ADMIN PANEL

</div>

<div class="card">

<h2>

💰 Total Deposits :
₹<span id="totalDeposit">

0

</span>

</h2>

</div>

<div id="pendingBox">

</div>

<div id="approvedBox">

</div>

<div id="failedBox">

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
doc,
getDoc,
updateDoc,
addDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "skyadda-1d849.firebaseapp.com",

projectId: "skyadda-1d849",

storageBucket: "skyadda-1d849.appspot.com",

messagingSenderId: "YOUR_SENDER_ID",

appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const pendingBox =
document.getElementById("pendingBox");

const approvedBox =
document.getElementById("approvedBox");

const failedBox =
document.getElementById("failedBox");

let total = 0;

async function loadRequests(){

const querySnapshot =
await getDocs(
collection(db,"depositRequests")
);

pendingBox.innerHTML =
"<h1>🟡 Pending Requests</h1>";

approvedBox.innerHTML =
"<h1>🟢 Approved Requests</h1>";

failedBox.innerHTML =
"<h1>🔴 Failed Requests</h1>";

querySnapshot.forEach((item)=>{

const data = item.data();

total += Number(data.amount || 0);

const time =
data.time || "No Time";

const card = `

<div class="card">

<h2>👤 UID</h2>

<p>${data.uid}</p>

<h2>💰 Amount</h2>

<p>₹${data.amount}</p>

<h2>🧾 UTR</h2>

<p>${data.utr}</p>

<h2>

📌 Status :
${data.status}

</h2>

<div class="time">

📅 ${time}

</div>

<button
class="btn approve"
onclick="approveRequest(
'${item.id}',
'${data.uid}',
${data.amount}
)">

APPROVE

</button>

<button
class="btn failed"
onclick="failRequest(
'${item.id}',
'${data.uid}',
${data.amount}
)">

FAILED

</button>

</div>

`;

if(data.status == "Approved"){

approvedBox.innerHTML += card;

}

else if(data.status == "Failed"){

failedBox.innerHTML += card;

}

else{

pendingBox.innerHTML += card;

}

});

document.getElementById("totalDeposit")
.innerHTML = total;

}

loadRequests();

window.approveRequest =
async function(id,uid,amount){

const now =
new Date().toLocaleString();

const userRef =
doc(db,"users",uid);

const userSnap =
await getDoc(userRef);

if(userSnap.exists()){

const userData =
userSnap.data();

let currentMoney =
userData.money || 0;

await updateDoc(userRef,{

money:
currentMoney + Number(amount)

});

const reqRef =
doc(db,"depositRequests",id);

await updateDoc(reqRef,{

status:"Approved",
time:now

});

await addDoc(
collection(db,"transactions"),
{

uid:uid,
type:"Deposit",
amount:amount,
status:"Approved",
time:now

});

alert("✅ Payment Approved");

location.reload();

}

}

window.failRequest =
async function(id,uid,amount){

const now =
new Date().toLocaleString();

const reqRef =
doc(db,"depositRequests",id);

await updateDoc(reqRef,{

status:"Failed",
time:now

});

await addDoc(
collection(db,"transactions"),
{

uid:uid,
type:"Deposit",
amount:amount,
status:"Failed",
time:now

});

alert("❌ Request Failed");

location.reload();

}

</script>

</body>

</html>
