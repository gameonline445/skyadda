<!DOCTYPE html>
<html>

<head>

<title>SKY ADDA</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e8e0bb;
}

.topbar{
background:black;
color:white;
padding:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
border-bottom:4px solid yellow;
}

.wallet{
display:flex;
justify-content:space-around;
margin-top:30px;
}

.box{
background:white;
width:130px;
height:130px;
border-radius:20px;
text-align:center;
padding-top:20px;
font-size:35px;
font-weight:bold;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.box p{
font-size:20px;
margin-top:10px;
}

#addmoney{
margin-top:30px;
padding:18px 40px;
font-size:28px;
background:#00d9ff;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
}

.battle{
background:white;
margin:30px;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.battle h2{
font-size:40px;
}

input{
width:90%;
padding:20px;
font-size:28px;
border-radius:15px;
border:3px solid #00d9aa;
}

button{
margin-top:20px;
padding:18px 40px;
font-size:28px;
background:#00d9aa;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
}

.notice{
background:black;
color:white;
margin:20px;
padding:20px;
font-size:25px;
border-radius:20px;
}

.running{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
}

.run-card{
display:flex;
justify-content:space-between;
background:#f1f1f1;
padding:20px;
margin-top:15px;
border-radius:15px;
font-size:25px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:black;
display:flex;
justify-content:space-around;
padding:10px;
color:white;
font-size:18px;
}

.item{
text-align:center;
}

a{
text-decoration:none;
}

</style>

</head>

<body>

<div class="topbar">

SKY ADDA

</div>

<div class="wallet">

<div class="box">

💰 ₹0

<p>Wallet</p>

</div>

<div class="box">

🏆 ₹0

<p>Winning</p>

</div>

</div>

<center>

<button id="addmoney">

Add Money

</button>

</center>

<div class="battle">

<h2>🎮 Play Ludo</h2>

<p style="font-size:25px;">
Entry Fee ₹10
</p>

<a href="ludo.html">

<button>

PLAY NOW

</button>

</a>

</div>

<div class="battle">

<h2>Open Battle</h2>

<input type="number"
placeholder="Enter Amount">

<br>

<button>

SET

</button>

</div>

<div class="notice">

⚠️ Game पूरा होने के बाद सही रिजल्ट डालें

</div>

<div class="running">

<h2>Running Battles</h2>

<div class="run-card">

<div>Classic Battle</div>

<div>₹50</div>

</div>

<div class="run-card">

<div>Classic Battle</div>

<div>₹100</div>

</div>

</div>

<div class="bottom">

<div class="item">
🏠
<p>Home</p>
</div>

<div class="item">
💰
<p>Wallet</p>
</div>

<div class="item">
🎁
<p>Refer</p>
</div>

<div class="item">
☎️
<p>Support</p>
</div>

<div class="item">
👤
<p>Profile</p>
</div>

</div>

</body>

</html>
