<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword
  }

  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBNnnLu7HpCImLl5cIWKmB_eLjsbaR6zxg",
    authDomain: "skyadda-1d849.firebaseapp.com",
    projectId: "skyadda-1d849",
    storageBucket: "skyadda-1d849.firebasestorage.app",
    messagingSenderId: "929894889505",
    appId: "1:929894889505:web:6e76e0eb701ffe89d60b60",
    measurementId: "G-GPT48HDF0K"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.signup = function () {

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)

    .then(() => {

      alert("Account Created");

    })

    .catch((error) => {

      alert(error.message);

    });

  }

  window.login = function () {

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)

    .then(() => {

      alert("Login Success");

      window.location.href = "index.html";

    })

    .catch((error) => {

      alert(error.message);

    });

  }

  </script>

<style>

body{
background:black;
color:white;
font-family:sans-serif;
text-align:center;
padding-top:100px;
}

input{
width:80%;
padding:15px;
margin:10px;
border:none;
border-radius:10px;
}

button{
padding:15px 30px;
margin:10px;
border:none;
border-radius:10px;
background:cyan;
font-size:18px;
}

</style>

</head>

<body>

<h1>SKY ADDA LOGIN</h1>

<input type="email" id="email" placeholder="Enter Email">

<br>

<input type="password" id="password" placeholder="Enter Password">

<br>

<button onclick="signup()">Signup</button>

<button onclick="login()">Login</button>

</body>
</html>
