<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{

background:black;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.login-box{

background:white;
padding:30px;
border-radius:20px;
width:300px;
text-align:center;

}

h1{

margin-bottom:20px;

}

input{

width:100%;
padding:15px;
margin-top:15px;
border-radius:10px;
border:1px solid gray;
font-size:16px;

}

button{

width:100%;
padding:15px;
margin-top:20px;
background:#00b894;
color:white;
border:none;
border-radius:10px;
font-size:18px;

}

</style>

</head>

<body>

<div class="login-box">

<h1>SKY ADDA</h1>

<input type="email" placeholder="Enter Email">

<input type="password" placeholder="Enter Password">

<button>Login</button>

</div>

</body>

</html>
