<!DOCTYPE html>
<html>

<head>

<title>Manual Deposit</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.top{
background:black;
padding:20px;
font-size:35px;
font-weight:bold;
}

.box{
background:#1e1e1e;
margin:20px;
padding:25px;
border-radius:20px;
}

img{
width:260px;
border-radius:20px;
margin-top:20px;
}

input{
width:90%;
padding:18px;
font-size:22px;
border:none;
border-radius:15px;
margin-top:20px;
}

button{
width:90%;
padding:18px;
font-size:24px;
border:none;
border-radius:15px;
background:#00cfff;
color:white;
font-weight:bold;
margin-top:25px;
}

#status{
margin-top:20px;
font-size:22px;
color:#00ff99;
}

</style>

</head>

<body>

<div class="top">

💳 MANUAL DEPOSIT

</div>

<div class="box">

<h2>Scan & Pay</h2>

<img src="qr.jpg">

<h3>

UPI ID:

<br><br>

7878852370-1@okbizaxis

</h3>

<input
type="number"
id="amount"
placeholder="Enter Amount">

<input
type="text"
id="utr"
placeholder="Enter UTR Number">

<button onclick="sendRequest()">

SEND REQUEST

</button>

<div id="status"></div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBNnnLu7HpCImLl5cIWKmB_eLjsbaR6zxg",

authDomain: "skyadda-1d849.firebaseapp.com",

projectId: "skyadda-1d849",

storageBucket: "skyadda-1d849.firebasestorage.app",

messagingSenderId: "929894889505",

appId: "1:929894889505:web:6e76e0eb701ffe89d60b60"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.sendRequest = async function(){

let amount =
document.getElementById("amount").value;

let utr =
document.getElementById("utr").value;

let uid =
localStorage.getItem("uid");

if(amount == "" || utr == ""){

alert("Fill All Fields");

return;

}

await addDoc(collection(db,"depositRequests"),{

uid:uid,
amount:amount,
utr:utr,
status:"Pending"

});

document.getElementById("status")
.innerHTML =

"✅ Deposit Request Sent";

}

</script>

</body>

</html>
