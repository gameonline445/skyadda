<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ludo King Style</title>

<style>

body{
margin:0;
padding:0;
background:#111;
font-family:Arial;
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
margin-top:15px;
font-size:38px;
}

.topbar{
font-size:22px;
margin-top:10px;
}

.board{
width:360px;
height:360px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(15,1fr);
grid-template-rows:repeat(15,1fr);
background:white;
border:4px solid #222;
border-radius:15px;
overflow:hidden;
}

.cell{
border:1px solid #ccc;
display:flex;
justify-content:center;
align-items:center;
font-size:18px;
font-weight:bold;
box-sizing:border-box;
}

.red-home{
background:#ff2e2e;
}

.green-home{
background:#00b33c;
}

.yellow-home{
background:#ffd500;
}

.blue-home{
background:#1f5eff;
}

.path{
background:#fff;
}

.red-path{
background:#ff9999;
}

.green-path{
background:#99ffbb;
}

.yellow-path{
background:#fff099;
}

.blue-path{
background:#99bbff;
}

.center{
background:#111;
color:white;
font-size:24px;
}

.token{
width:18px;
height:18px;
border-radius:50%;
border:2px solid white;
}

.red-token{
background:red;
}

.green-token{
background:green;
}

.yellow-token{
background:gold;
}

.blue-token{
background:blue;
}

.controls{
margin-top:20px;
}

#dice{
font-size:70px;
margin-top:10px;
}

button{
padding:18px 50px;
font-size:24px;
font-weight:bold;
border:none;
border-radius:20px;
background:#8a2cff;
color:white;
margin-top:20px;
}

.status{
font-size:24px;
margin-top:15px;
}

#winner{
font-size:35px;
color:#00ff90;
margin-top:20px;
}

.wallet{
margin-top:10px;
font-size:22px;
}

</style>
</head>

<body>

<h1>🎮 LUDO KING STYLE</h1>

<div class="topbar">
Turn : <span id="turnText">RED</span>
</div>

<div class="wallet">
🏆 Winner gets ₹20
</div>

<div class="board" id="board"></div>

<div class="controls">

<div id="dice">1</div>

<button onclick="rollDice()">
🎲 ROLL DICE
</button>

<div class="status" id="status">
Game Started
</div>

<div id="winner"></div>

</div>

<script>

const board = document.getElementById("board");

for(let row=0; row<15; row++){

for(let col=0; col<15; col++){

const cell = document.createElement("div");
cell.classList.add("cell");

if(row < 6 && col < 6){
cell.classList.add("red-home");
}

else if(row < 6 && col > 8){
cell.classList.add("green-home");
}

else if(row > 8 && col < 6){
cell.classList.add("blue-home");
}

else if(row > 8 && col > 8){
cell.classList.add("yellow-home");
}

else if(row == 7 && col == 7){
cell.classList.add("center");
cell.innerHTML = "🏆";
}

else{
cell.classList.add("path");
}

board.appendChild(cell);

}

}

const cells = document.querySelectorAll(".cell");

const path = [
6,7,8,23,38,53,68,83,98,113,128,127,
126,125,124,123,122,121,136,151,166,
181,196,211,212,213,214,215,216,217,
218,219,220,205,190,175,160,145,130,
115,100,85,70,55,40,25,10,9
];

const players = {
RED:{
position:-1,
class:"red-token"
},
GREEN:{
position:-1,
class:"green-token"
},
YELLOW:{
position:-1,
class:"yellow-token"
},
BLUE:{
position:-1,
class:"blue-token"
}
};

let currentPlayer = "RED";

const turns = ["RED","GREEN","YELLOW","BLUE"];

function clearTokens(){

document.querySelectorAll(".token")
.forEach(token=>token.remove());

}

function drawTokens(){

clearTokens();

for(let player in players){

let pos = players[player].position;

if(pos >= 0 && pos < path.length){

const token = document.createElement("div");

token.classList.add("token");

token.classList.add(players[player].class);

cells[path[pos]].appendChild(token);

}

}

}

function nextTurn(){

let index = turns.indexOf(currentPlayer);

index++;

if(index >= turns.length){
index = 0;
}

currentPlayer = turns[index];

document.getElementById("turnText")
.innerHTML = currentPlayer;

}

function rollDice(){

let dice = Math.floor(Math.random()*6)+1;

const faces = {
1:"⚀",
2:"⚁",
3:"⚂",
4:"⚃",
5:"⚄",
6:"⚅"
};

document.getElementById("dice")
.innerHTML = faces[dice];

let player = players[currentPlayer];

if(player.position == -1){

if(dice == 6){
player.position = 0;

document.getElementById("status")
.innerHTML = currentPlayer + " entered board";

}

else{

document.getElementById("status")
.innerHTML = currentPlayer + " needs 6";

nextTurn();
return;

}

}

else{

player.position += dice;

if(player.position >= path.length-1){

player.position = path.length-1;

endGame(currentPlayer);

}

checkKills(currentPlayer);

}

if(dice != 6){
nextTurn();
}

updateBoard();

}

function checkKills(activePlayer){

for(let player in players){

if(player != activePlayer){

if(players[player].position == players[activePlayer].position){

if(players[player].position > 0){

players[player].position = -1;

}

}

}

}

}

function updateBoard(){

drawTokens();

}

function endGame(player){

document.getElementById("winner")
.innerHTML = "🏆 " + player + " WINS";

}

updateBoard();

</script>

</body>
</html>
