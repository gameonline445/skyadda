<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ELITE FINAL REAL LUDO KING</title>

<style>

body{
margin:0;
padding:0;
background:#050505;
font-family:Arial;
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
font-size:38px;
margin-top:15px;
}

.turnBox{
font-size:26px;
margin-top:10px;
}

.info{
font-size:20px;
margin-top:10px;
}

.board{

width:390px;
height:390px;

margin:20px auto;

display:grid;

grid-template-columns:repeat(15,1fr);
grid-template-rows:repeat(15,1fr);

background:white;

border-radius:22px;

overflow:hidden;

border:5px solid #222;

box-shadow:0 0 35px rgba(0,0,0,0.9);

}

.cell{

border:1px solid #ddd;

position:relative;

display:flex;
justify-content:center;
align-items:center;

box-sizing:border-box;

}

.red-home{
background:#ff4040;
}

.green-home{
background:#22cc55;
}

.blue-home{
background:#2d6cff;
}

.yellow-home{
background:#ffd633;
}

.path{
background:white;
}

.safe{
background:#ededed;
}

.center{
background:black;
color:white;
font-size:22px;
}

.token{

width:20px;
height:20px;

border-radius:50%;

border:2px solid white;

position:absolute;

cursor:pointer;

transition:0.15s linear;

box-shadow:0 0 12px rgba(0,0,0,0.7);

z-index:2;

}

.r{
background:red;
}

.g{
background:limegreen;
}

.b{
background:deepskyblue;
}

.y{
background:gold;
}

.active{

animation:glow 1s infinite;

}

@keyframes glow{

0%{
box-shadow:0 0 5px white;
}

50%{
box-shadow:0 0 22px white;
}

100%{
box-shadow:0 0 5px white;
}

}

#dice{

font-size:95px;

margin-top:10px;

transition:0.3s;

}

.rollAnim{

animation:shake 0.5s;

}

@keyframes shake{

0%{
transform:rotate(0deg);
}

25%{
transform:rotate(20deg);
}

50%{
transform:rotate(-20deg);
}

75%{
transform:rotate(10deg);
}

100%{
transform:rotate(0deg);
}

}

button{

padding:18px 60px;

font-size:26px;

font-weight:bold;

border:none;

border-radius:25px;

background:linear-gradient(
45deg,
#8a2cff,
#e05fff
);

color:white;

margin-top:20px;

box-shadow:0 0 25px purple;

}

#winner{

font-size:42px;

margin-top:20px;

color:#00ff90;

animation:winnerGlow 1s infinite;

}

@keyframes winnerGlow{

0%{
text-shadow:0 0 5px #00ff90;
}

50%{
text-shadow:0 0 20px #00ff90;
}

100%{
text-shadow:0 0 5px #00ff90;
}

}

.overlay{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.88);

display:none;

justify-content:center;
align-items:center;

flex-direction:column;

z-index:9999;

}

.overlay h2{

font-size:50px;
color:#00ff90;

}

</style>

</head>

<body>

<h1>
🎮 ELITE FINAL LUDO KING
</h1>

<div class="turnBox">

TURN :
<span id="turnText">
RED
</span>

</div>

<div class="info">
🔥 ELITE FINAL VERSION
</div>

<div class="board"
id="board">

</div>

<div id="dice">
⚀
</div>

<button onclick="rollDice()">
🎲 ROLL DICE
</button>

<div id="winner"></div>

<div class="overlay"
id="winScreen">

<h2 id="winText">
WINNER
</h2>

<button onclick="location.reload()">
🔄 PLAY AGAIN
</button>

</div>

<audio id="moveSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3">
</audio>

<script>

const board =
document.getElementById("board");

for(let i=0;i<225;i++){

const cell =
document.createElement("div");

cell.classList.add("cell");

let row =
Math.floor(i/15);

let col =
i%15;

if(row<6 && col<6){

cell.classList.add("red-home");

}

else if(row<6 && col>8){

cell.classList.add("green-home");

}

else if(row>8 && col<6){

cell.classList.add("blue-home");

}

else if(row>8 && col>8){

cell.classList.add("yellow-home");

}

else if(row==7 && col==7){

cell.classList.add("center");

cell.innerHTML="🏆";

}

else{

cell.classList.add("path");

}

board.appendChild(cell);

}

const cells =
document.querySelectorAll(".cell");

const safeSpots = [
6,38,68,98,128,166,196
];

safeSpots.forEach(i=>{

cells[i].classList.add("safe");

cells[i].innerHTML="⭐";

});

const path = [

6,7,8,23,38,53,68,83,98,113,128,
127,126,125,124,123,122,121,136,
151,166,181,196,211,212,213,214,
215,216,217,218,219,220,205,190,
175,160,145,130,115,100,85,70,
55,40,25,10,9

];

const players = {

RED:[
{pos:-1,class:"r"},
{pos:-1,class:"r"},
{pos:-1,class:"r"},
{pos:-1,class:"r"}
],

GREEN:[
{pos:-1,class:"g"},
{pos:-1,class:"g"},
{pos:-1,class:"g"},
{pos:-1,class:"g"}
],

BLUE:[
{pos:-1,class:"b"},
{pos:-1,class:"b"},
{pos:-1,class:"b"},
{pos:-1,class:"b"}
],

YELLOW:[
{pos:-1,class:"y"},
{pos:-1,class:"y"},
{pos:-1,class:"y"},
{pos:-1,class:"y"}
]

};

const homePositions = {

RED:[0,1,15,16],
GREEN:[13,14,28,29],
BLUE:[195,196,210,211],
YELLOW:[208,209,223,224]

};

const turns = [
"RED",
"GREEN",
"BLUE",
"YELLOW"
];

let currentTurn = 0;

let currentDice = 0;

function clearTokens(){

document.querySelectorAll(".token")
.forEach(t=>t.remove());

}

function drawTokens(){

clearTokens();

for(let player in players){

players[player].forEach(
(token,index)=>{

const t =
document.createElement("div");

t.classList.add(
"token"
);

t.classList.add(
token.class
);

if(
player==
turns[currentTurn]
){

t.classList.add(
"active"
);

}

t.onclick=()=>{

moveToken(
player,
index
);

};

if(token.pos==-1){

cells[
homePositions[player][index]
].appendChild(t);

}

else{

cells[
path[token.pos]
].appendChild(t);

}

});

}

}

function nextTurn(){

currentTurn++;

if(currentTurn>=4){

currentTurn=0;

}

document.getElementById(
"turnText"
).innerHTML =
turns[currentTurn];

drawTokens();

if(
turns[currentTurn]!="RED"
){

setTimeout(aiPlay,1000);

}

}

function rollDice(){

if(
turns[currentTurn]!="RED"
){

return;

}

rollNow();

}

function rollNow(){

const faces = [
"⚀","⚁","⚂","⚃","⚄","⚅"
];

const dice =
document.getElementById("dice");

dice.classList.add(
"rollAnim"
);

setTimeout(()=>{

dice.classList.remove(
"rollAnim"
);

},500);

currentDice =
Math.floor(Math.random()*6)+1;

dice.innerHTML =
faces[currentDice-1];

}

function moveToken(player,index){

if(player!=turns[currentTurn]){

return;

}

if(currentDice==0){

return;

}

document.getElementById(
"moveSound"
).play();

let token =
players[player][index];

if(token.pos==-1){

if(currentDice==6){

token.pos=0;

drawTokens();

finishMove(player,index);

}

else{

return;

}

}

else{

let steps =
currentDice;

let move =
setInterval(()=>{

if(steps>0){

token.pos++;

if(token.pos>=path.length){

token.pos=
path.length-1;

}

steps--;

drawTokens();

}

else{

clearInterval(move);

finishMove(
player,
index
);

}

},140);

}

currentDice=0;

}

function finishMove(player,index){

let token =
players[player][index];

if(
token.pos>=path.length-1
){

showWinner(player);

return;

}

killCheck(player,index);

drawTokens();

setTimeout(()=>{

nextTurn();

},500);

}

function killCheck(player,index){

let active =
players[player][index];

for(let p in players){

if(p!=player){

players[p].forEach(t=>{

if(
t.pos==
active.pos
&&
!safeSpots.includes(
path[t.pos]
)
&&
t.pos>0
){

t.pos=-1;

}

});

}

}

}

function aiPlay(){

rollNow();

let ai =
turns[currentTurn];

let tokens =
players[ai];

let choice = 0;

for(let i=0;i<4;i++){

if(
tokens[i].pos!=-1
||
currentDice==6
){

choice=i;

break;

}

}

setTimeout(()=>{

moveToken(ai,choice);

},700);

}

function showWinner(player){

document.getElementById(
"winner"
).innerHTML =
"🏆 "+player+" WINS 🎉";

document.getElementById(
"winText"
).innerHTML =
"🏆 "+player+" WINS";

document.getElementById(
"winScreen"
).style.display=
"flex";

confetti();

}

function confetti(){

for(let i=0;i<80;i++){

const div =
document.createElement("div");

div.style.position="fixed";

div.style.width="10px";

div.style.height="10px";

div.style.background=
["red","yellow","blue","green"]
[Math.floor(Math.random()*4)];

div.style.left=
Math.random()*100+"vw";

div.style.top="-10px";

div.style.zIndex="9999";

document.body.appendChild(div);

let fall =
setInterval(()=>{

div.style.top=
parseInt(div.style.top)+5+"px";

if(
parseInt(div.style.top)>
window.innerHeight
){

clearInterval(fall);

div.remove();

}

},30);

}

}

drawTokens();

</script>

</body>
</html>
