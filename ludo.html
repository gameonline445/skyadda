<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>REAL CUSTOM LUDO KING</title><style>body{margin:0;background:#111;font-family:Arial;text-align:center;color:#fff}h1{margin:10px;font-size:32px}.board{width:390px;height:390px;margin:auto;display:grid;grid-template-columns:repeat(15,1fr);grid-template-rows:repeat(15,1fr);background:#fff;border:5px solid #222;border-radius:20px;overflow:hidden}.cell{border:1px solid #ddd;position:relative}.red{background:#ff4d4d}.green{background:#32cd32}.blue{background:#3399ff}.yellow{background:#ffd633}.white{background:#fff}.center{background:#000;color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px}.token{width:18px;height:18px;border-radius:50%;position:absolute;top:3px;left:3px;border:2px solid #fff;cursor:pointer;transition:.15s linear}.r{background:red}.g{background:lime}.b{background:deepskyblue}.y{background:gold}.active{box-shadow:0 0 15px #fff}button{padding:15px 35px;font-size:22px;border:none;border-radius:18px;background:#b026ff;color:#fff;margin-top:15px}#dice{font-size:80px;margin-top:10px}#winner{font-size:35px;color:#00ff99;margin-top:10px}</style></head><body><h1>🎮 REAL CUSTOM LUDO KING</h1><h2 id="turn">TURN : RED</h2><div class="board" id="board"></div><div id="dice">⚀</div><button onclick="rollDice()">🎲 ROLL DICE</button><h2 id="winner"></h2><script>const board=document.getElementById("board");for(let i=0;i<225;i++){let c=document.createElement("div");c.className="cell";let r=Math.floor(i/15),cl=i%15;if(r<6&&cl<6)c.classList.add("red");else if(r<6&&cl>8)c.classList.add("green");else if(r>8&&cl<6)c.classList.add("blue");else if(r>8&&cl>8)c.classList.add("yellow");else if(r==7&&cl==7){c.classList.add("center");c.innerHTML="🏆"}else c.classList.add("white");board.appendChild(c)}const cells=document.querySelectorAll(".cell"),safe=[1,9,14,22,27,35,40,48],path=[91,92,93,94,95,80,65,50,35,20,5,6,7,22,37,52,67,68,69,70,71,72,87,102,117,132,147,162,177,192,207,208,209,194,179,164,149,134,119,118,117,116,115,114,99,84,83,82,81,96,111,126],homes={RED:[0,1,15,16],GREEN:[13,14,28,29],BLUE:[195,196,210,211],YELLOW:[208,209,223,224]},players={RED:[{p:-1,c:"r"},{p:-1,c:"r"},{p:-1,c:"r"},{p:-1,c:"r"}],GREEN:[{p:-1,c:"g"},{p:-1,c:"g"},{p:-1,c:"g"},{p:-1,c:"g"}],BLUE:[{p:-1,c:"b"},{p:-1,c:"b"},{p:-1,c:"b"},{p:-1,c:"b"}],YELLOW:[{p:-1,c:"y"},{p:-1,c:"y"},{p:-1,c:"y"},{p:-1,c:"y"}]},turns=["RED","GREEN","BLUE","YELLOW"];let turn=0,dice=0;function draw(){document.querySelectorAll(".token").forEach(t=>t.remove());for(let clr in players){players[clr].forEach((tk,i)=>{let d=document.createElement("div");d.className="token "+tk.c;if(clr==turns[turn])d.classList.add("active");d.onclick=()=>move(clr,i);if(tk.p==-1)cells[homes[clr][i]].appendChild(d);else cells[path[tk.p]].appendChild(d)})}}function rollDice(){const f=["⚀","⚁","⚂","⚃","⚄","⚅"];dice=Math.floor(Math.random()*6)+1;document.getElementById("dice").innerHTML=f[dice-1]}function move(clr,i){if(clr!=turns[turn]||dice==0)return;let t=players[clr][i];if(t.p==-1){if(dice==6)t.p=0;else return}else{let step=dice;let mv=setInterval(()=>{if(step>0){t.p++;if(t.p>=path.length)t.p=path.length-1;step--;draw()}else{clearInterval(mv);finish(clr,i)}},120);return}finish(clr,i)}function finish(clr,i){kill(clr,i);check(clr);dice=0;if(dice!=6){turn++;if(turn>=4)turn=0}document.getElementById("turn").innerHTML="TURN : "+turns[turn];draw()}function kill(clr,i){let a=players[clr][i];for(let c in players)if(c!=clr)players[c].forEach(o=>{if(o.p==a.p&&o.p!=-1&&!safe.includes(a.p))o.p=-1})}function check(clr){let w=0;players[clr].forEach(a=>{if(a.p>=path.length-1)w++});if(w==4)document.getElementById("winner").innerHTML="🏆 "+clr+" WINS"}draw()</script></body></html>
