<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REAL GAMEPLAY ENGINE LUDO</title>

<style>

body{
margin:0;
padding:0;
background:#050505;
font-family:Arial;
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
font-size:34px;
margin-top:15px;
}

.turnBox{
font-size:24px;
margin-top:10px;
}

.board{

width:390px;
height:390px;

margin:20px auto;

display:grid;

grid-template-columns:repeat(15,1fr);
grid-template-rows:repeat(15,1fr);

background:white;

border-radius:22px;

overflow:hidden;

border:5px solid #222;

box-shadow:0 0 35px rgba(0,0,0,0.9);

}

.cell{

border:1px solid #ddd;

position:relative;

display:flex;
justify-content:center;
align-items:center;

box-sizing:border-box;

font-size:12px;

}

.red-home{
background:#ff4040;
}

.green-home{
background:#22cc55;
}

.blue-home{
background:#2d6cff;
}

.yellow-home{
background:#ffd633;
}

.path{
background:white;
}

.safe{
background:#ececec;
}

.center{
background:black;
color:white;
font-size:20px;
}

.token{

width:18px;
height:18px;

border-radius:50%;

border:2px solid white;

position:absolute;

cursor:pointer;

transition:0.12s linear;

box-shadow:0 0 10px rgba(0,0,0,0.7);

z-index:2;

}

.r{
background:red;
}

.g{
background:limegreen;
}

.b{
background:deepskyblue;
}

.y{
background:gold;
}

.active{

animation:glow 1s infinite;

}

@keyframes glow{

0%{
box-shadow:0 0 5px white;
}

50%{
box-shadow:0 0 22px white;
}

100%{
box-shadow:0 0 5px white;
}

}

#dice{

font-size:90px;
margin-top:10px;

}

.rollAnim{
animation:shake 0.5s;
}

@keyframes shake{

0%{transform:rotate(0deg);}
25%{transform:rotate(20deg);}
50%{transform:rotate(-20deg);}
75%{transform:rotate(10deg);}
100%{transform:rotate(0deg);}

}

button{

padding:15px 35px;

font-size:20px;

font-weight:bold;

border:none;

border-radius:18px;

background:linear-gradient(
45deg,
#8a2cff,
#ff55ff
);

color:white;

box-shadow:0 0 20px purple;

margin-top:12px;

}

#winner{

font-size:36px;

margin-top:15px;

color:#00ff90;

}

</style>

</head>

<body>

<h1>
🎮 REAL GAMEPLAY LUDO
</h1>

<div class="turnBox">

TURN :
<span id="turnText">
RED
</span>

</div>

<div class="board"
id="board">

</div>

<div id="dice">
⚀
</div>

<button onclick="rollDice()">
🎲 ROLL DICE
</button>

<div id="winner"></div>

<script>

const board =
document.getElementById("board");

for(let i=0;i<225;i++){

const cell =
document.createElement("div");

cell.classList.add("cell");

let row =
Math.floor(i/15);

let col =
i%15;

if(row<6 && col<6){

cell.classList.add("red-home");

}

else if(row<6 && col>8){

cell.classList.add("green-home");

}

else if(row>8 && col<6){

cell.classList.add("blue-home");

}

else if(row>8 && col>8){

cell.classList.add("yellow-home");

}

else if(row==7 && col==7){

cell.classList.add("center");

cell.innerHTML="🏆";

}

else{

cell.classList.add("path");

}

board.appendChild(cell);

}

const cells =
document.querySelectorAll(".cell");

const safeSpots = [
6,38,68,98,128,166,196
];

safeSpots.forEach(i=>{

cells[i].classList.add("safe");

cells[i].innerHTML="⭐";

});

const path = [

6,7,8,23,38,53,68,83,98,113,
128,127,126,125,124,123,122,
121,136,151,166,181,196,211,
212,213,214,215,216,217,218,
219,220,205,190,175,160,145,
130,115,100,85,70,55,40,25,
10,9

];

const players = {

RED:[
{pos:-1,class:"r"},
{pos:-1,class:"r"},
{pos:-1,class:"r"},
{pos:-1,class:"r"}
],

GREEN:[
{pos:-1,class:"g"},
{pos:-1,class:"g"},
{pos:-1,class:"g"},
{pos:-1,class:"g"}
],

BLUE:[
{pos:-1,class:"b"},
{pos:-1,class:"b"},
{pos:-1,class:"b"},
{pos:-1,class:"b"}
],

YELLOW:[
{pos:-1,class:"y"},
{pos:-1,class:"y"},
{pos:-1,class:"y"},
{pos:-1,class:"y"}
]

};

const homePositions = {

RED:[0,1,15,16],
GREEN:[13,14,28,29],
BLUE:[195,196,210,211],
YELLOW:[208,209,223,224]

};

const turns = [
"RED",
"GREEN",
"BLUE",
"YELLOW"
];

let currentTurn = 0;

let currentDice = 0;

function clearTokens(){

document.querySelectorAll(".token")
.forEach(t=>t.remove());

}

function drawTokens(){

clearTokens();

for(let player in players){

players[player].forEach(
(token,index)=>{

const t =
document.createElement("div");

t.classList.add("token");

t.classList.add(token.class);

if(
player==
turns[currentTurn]
){

t.classList.add("active");

}

t.onclick=()=>{

moveToken(player,index);

};

if(token.pos==-1){

cells[
homePositions[player][index]
].appendChild(t);

}

else{

cells[
path[token.pos]
].appendChild(t);

}

});

}

}

function nextTurn(){

currentTurn++;

if(currentTurn>=4){

currentTurn=0;

}

document.getElementById(
"turnText"
).innerHTML =
turns[currentTurn];

drawTokens();

}

function rollDice(){

const faces = [
"⚀","⚁","⚂","⚃","⚄","⚅"
];

const dice =
document.getElementById("dice");

dice.classList.add("rollAnim");

setTimeout(()=>{

dice.classList.remove(
"rollAnim"
);

},500);

currentDice =
Math.floor(Math.random()*6)+1;

dice.innerHTML =
faces[currentDice-1];

}

function moveToken(player,index){

if(
player!=turns[currentTurn]
){

return;

}

if(currentDice==0){

return;

}

let token =
players[player][index];

if(token.pos==-1){

if(currentDice==6){

token.pos=0;

drawTokens();

if(currentDice!=6){

nextTurn();

}

currentDice=0;

}

else{

return;

}

}

else{

let steps =
currentDice;

let move =
setInterval(()=>{

if(steps>0){

token.pos++;

steps--;

drawTokens();

}

else{

clearInterval(move);

finishMove(player,index);

}

},140);

}

}

function finishMove(player,index){

let token =
players[player][index];

if(
token.pos>=path.length-1
){

token.pos=
path.length-1;

checkWinner(player);

return;

}

killCheck(player,index);

drawTokens();

if(currentDice!=6){

nextTurn();

}

currentDice=0;

}

function killCheck(player,index){

let active =
players[player][index];

for(let p in players){

if(p!=player){

players[p].forEach(t=>{

if(
t.pos==
active.pos
&&
!safeSpots.includes(
path[t.pos]
)
&&
t.pos>0
){

t.pos=-1;

}

});

}

}

}

function checkWinner(player){

let completed = 0;

players[player].forEach(t=>{

if(
t.pos>=path.length-1
){

completed++;

}

});

if(completed==4){

document.getElementById(
"winner"
).innerHTML =
"🏆 "+player+" WINS";

}

drawTokens();

}

drawTokens();

</script>

</body>
</html>
