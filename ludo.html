<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Custom Ludo</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

h1{
margin-top:20px;
font-size:40px;
}

.board{
display:grid;
grid-template-columns:repeat(5,70px);
gap:8px;
justify-content:center;
margin-top:30px;
}

.cell{
width:70px;
height:70px;
background:white;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
color:black;
font-weight:bold;
}

.player{
background:red;
color:white;
}

.finish{
background:green;
color:white;
}

#dice{
font-size:60px;
margin-top:30px;
}

button{
margin-top:30px;
padding:18px 40px;
font-size:25px;
font-weight:bold;
border:none;
border-radius:18px;
background:#8a2cff;
color:white;
}

#winner{
font-size:35px;
margin-top:30px;
color:#00ff90;
}

</style>

</head>

<body>

<h1>

🎮 CUSTOM LUDO

</h1>

<div class="board">

<div class="cell player" id="c1">🚗</div>
<div class="cell" id="c2"></div>
<div class="cell" id="c3"></div>
<div class="cell" id="c4"></div>
<div class="cell" id="c5"></div>

<div class="cell" id="c6"></div>
<div class="cell" id="c7"></div>
<div class="cell" id="c8"></div>
<div class="cell" id="c9"></div>
<div class="cell" id="c10"></div>

<div class="cell" id="c11"></div>
<div class="cell" id="c12"></div>
<div class="cell" id="c13"></div>
<div class="cell" id="c14"></div>
<div class="cell" id="c15"></div>

<div class="cell" id="c16"></div>
<div class="cell" id="c17"></div>
<div class="cell" id="c18"></div>
<div class="cell" id="c19"></div>
<div class="cell" id="c20"></div>

<div class="cell" id="c21"></div>
<div class="cell" id="c22"></div>
<div class="cell" id="c23"></div>
<div class="cell" id="c24"></div>

<div class="cell finish" id="c25">

🏆

</div>

</div>

<div id="dice">

1

</div>

<button onclick="rollDice()">

🎲 ROLL DICE

</button>

<div id="winner">

</div>

<script>

let position = 1;

function rollDice(){

let dice =
Math.floor(Math.random()*6)+1;

document.getElementById(
"dice"
).innerHTML = dice;

document.getElementById(
"c"+position
).innerHTML = "";

document.getElementById(
"c"+position
).classList.remove("player");

position += dice;

if(position >= 25){

position = 25;

document.getElementById(
"winner"
).innerHTML =
"🏆 YOU WIN";

}

document.getElementById(
"c"+position
).innerHTML = "🚗";

document.getElementById(
"c"+position
).classList.add("player");

}

</script>

</body>

</html>
