<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REAL CUSTOM LUDO KING</title>

<style>

body{
margin:0;
padding:0;
background:#050505;
font-family:Arial;
color:white;
text-align:center;
}

h1{
font-size:34px;
margin-top:15px;
}

.turn{
font-size:26px;
margin-top:10px;
}

.board{

width:390px;
height:390px;

margin:20px auto;

display:grid;

grid-template-columns:repeat(15,1fr);
grid-template-rows:repeat(15,1fr);

background:white;

border-radius:22px;

overflow:hidden;

border:5px solid #222;

box-shadow:0 0 35px rgba(0,0,0,0.9);

}

.cell{

border:1px solid #ddd;

display:flex;
justify-content:center;
align-items:center;

position:relative;

font-size:12px;

}

.red{
background:#ff4040;
}

.green{
background:#22cc55;
}

.blue{
background:#2d6cff;
}

.yellow{
background:#ffd633;
}

.white{
background:white;
}

.safe{
background:#ececec;
}

.center{
background:black;
color:white;
font-size:22px;
}

.token{

width:18px;
height:18px;

border-radius:50%;

border:2px solid white;

position:absolute;

cursor:pointer;

z-index:5;

transition:0.15s linear;

}

.r{
background:red;
}

.g{
background:limegreen;
}

.b{
background:deepskyblue;
}

.y{
background:gold;
}

.active{

animation:glow 1s infinite;

}

@keyframes glow{

0%{
box-shadow:0 0 5px white;
}

50%{
box-shadow:0 0 20px white;
}

100%{
box-shadow:0 0 5px white;
}

}

#dice{

font-size:90px;
margin-top:10px;

}

button{

padding:16px 40px;

font-size:22px;

font-weight:bold;

border:none;

border-radius:20px;

background:linear-gradient(
45deg,
#8a2cff,
#ff55ff
);

color:white;

box-shadow:0 0 25px purple;

margin-top:15px;

}

#winner{

font-size:36px;

margin-top:15px;

color:#00ff90;

}

</style>

</head>

<body>

<h1>
🎮 REAL CUSTOM LUDO
</h1>

<div class="turn">

TURN :
<span id="turnText">
RED
</span>

</div>

<div class="board"
id="board">

</div>

<div id="dice">
⚀
</div>

<button onclick="rollDice()">
🎲 ROLL DICE
</button>

<div id="winner"></div>

<script>

const board =
document.getElementById("board");

for(let i=0;i<225;i++){

const cell =
document.createElement("div");

cell.classList.add("cell");

let row =
Math.floor(i/15);

let col =
i%15;

if(row<6 && col<6){

cell.classList.add("red");

}

else if(row<6 && col>8){

cell.classList.add("green");

}

else if(row>8 && col<6){

cell.classList.add("blue");

}

else if(row>8 && col>8){

cell.classList.add("yellow");

}

else if(row==7 && col==7){

cell.classList.add("center");

cell.innerHTML="🏆";

}

else{

cell.classList.add("white");

}

board.appendChild(cell);

}

const cells =
document.querySelectorAll(".cell");

const safeSpots = [
6,38,68,98,128,166,196
];

safeSpots.forEach(i=>{

cells[i].classList.add("safe");

cells[i].innerHTML="⭐";

});

const path = [

6,7,8,23,38,53,68,83,98,113,
128,127,126,125,124,123,122,
121,136,151,166,181,196,211,
212,213,214,215,216,217,218,
219,220,205,190,175,160,145,
130,115,100,85,70,55,40,25,
10,9

];

const players = {

RED:[
{pos:-1,class:"r"},
{pos:-1,class:"r"},
{pos:-1,class:"r"},
{pos:-1,class:"r"}
],

GREEN:[
{pos:-1,class:"g"},
{pos:-1,class:"g"},
{pos:-1,class:"g"},
{pos:-1,class:"g"}
],

BLUE:[
{pos:-1,class:"b"},
{pos:-1,class:"b"},
{pos:-1,class:"b"},
{pos:-1,class:"b"}
],

YELLOW:[
{pos:-1,class:"y"},
{pos:-1,class:"y"},
{pos:-1,class:"y"},
{pos:-1,class:"y"}
]

};

const homes = {

RED:[0,1,15,16],
GREEN:[13,14,28,29],
BLUE:[195,196,210,211],
YELLOW:[208,209,223,224]

};

const order = [
"RED",
"GREEN",
"BLUE",
"YELLOW"
];

let current = 0;

let diceValue = 0;

function clearTokens(){

document.querySelectorAll(".token")
.forEach(t=>t.remove());

}

function drawTokens(){

clearTokens();

for(let color in players){

players[color].forEach(
(token,index)=>{

const div =
document.createElement("div");

div.classList.add(
"token"
);

div.classList.add(
token.class
);

if(
color==
order[current]
){

div.classList.add(
"active"
);

}

div.onclick=()=>{

moveToken(
color,
index
);

};

if(token.pos==-1){

cells[
homes[color][index]
].appendChild(div);

}

else{

cells[
path[token.pos]
].appendChild(div);

}

});

}

}

function rollDice(){

const faces = [
"⚀","⚁","⚂","⚃","⚄","⚅"
];

diceValue =
Math.floor(Math.random()*6)+1;

document.getElementById(
"dice"
).innerHTML =
faces[diceValue-1];

}

function moveToken(color,index){

if(
color!=order[current]
){

return;

}

if(diceValue==0){

return;

}

let token =
players[color][index];

if(token.pos==-1){

if(diceValue==6){

token.pos=0;

drawTokens();

diceValue=0;

return;

}

else{

return;

}

}

let steps =
diceValue;

let move =
setInterval(()=>{

if(steps>0){

token.pos++;

if(
token.pos>=path.length
){

token.pos=
path.length-1;

}

steps--;

drawTokens();

}

else{

clearInterval(move);

finishMove(
color,
index
);

}

},150);

}

function finishMove(color,index){

killCheck(color,index);

drawTokens();

checkWinner(color);

nextTurn();

diceValue=0;

}

function killCheck(color,index){

let active =
players[color][index];

for(let c in players){

if(c!=color){

players[c].forEach(t=>{

if(
t.pos==
active.pos
&&
t.pos!=-1
&&
!safeSpots.includes(
path[t.pos]
)
){

t.pos=-1;

}

});

}

}

}

function checkWinner(color){

let complete = 0;

players[color].forEach(t=>{

if(
t.pos>=path.length-1
){

complete++;

}

});

if(complete==4){

document.getElementById(
"winner"
).innerHTML =
"🏆 "+color+" WINS";

}

}

function nextTurn(){

current++;

if(current>=4){

current=0;

}

document.getElementById(
"turnText"
).innerHTML =
order[current];

}

drawTokens();

</script>

</body>
</html>
