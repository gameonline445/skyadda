<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>FULL REAL LUDO</title>

<style>

body{
margin:0;
padding:0;
background:#111;
font-family:Arial;
text-align:center;
color:white;
overflow-x:hidden;
}

h1{
margin-top:20px;
font-size:42px;
}

.board{

width:390px;
height:390px;

margin:20px auto;

display:grid;

grid-template-columns:repeat(15,1fr);

grid-template-rows:repeat(15,1fr);

background:white;

border-radius:20px;

overflow:hidden;

}

.cell{

border:1px solid #ddd;

display:flex;

justify-content:center;

align-items:center;

font-size:16px;

font-weight:bold;

}

.red{
background:red;
}

.green{
background:green;
}

.blue{
background:blue;
}

.yellow{
background:gold;
}

.white{
background:white;
}

.safe{
background:#ccc;
}

.center{

background:black;
color:white;
font-size:28px;

}

.token{

font-size:22px;

}

#dice{

font-size:70px;
margin-top:20px;

}

button{

padding:18px 50px;

font-size:28px;

font-weight:bold;

border:none;

border-radius:20px;

background:#8a2cff;

color:white;

margin-top:20px;

}

#winner{

font-size:35px;

margin-top:20px;

color:#00ff90;

}

.info{

font-size:25px;

margin-top:10px;

}

</style>

</head>

<body>

<h1>

🎮 FULL REAL LUDO

</h1>

<div class="info">

Current Turn :
<span id="turn">

RED

</span>

</div>

<div class="board" id="board">

</div>

<div id="dice">

1

</div>

<button onclick="rollDice()">

🎲 ROLL DICE

</button>

<div id="winner">

</div>

<script>

const board =
document.getElementById("board");

for(let i=1;i<=225;i++){

const cell =
document.createElement("div");

cell.className = "cell white";

if(i<=36){

cell.classList.add("red");

}

if(i>=46 && i<=81){

cell.classList.add("green");

}

if(i>=136 && i<=171){

cell.classList.add("blue");

}

if(i>=181 && i<=216){

cell.classList.add("yellow");

}

if(i==113){

cell.classList.add("center");

cell.innerHTML = "🏆";

}

board.appendChild(cell);

}

let dice = 1;

let currentPlayer = "RED";

let positions = {

RED:0,
GREEN:0,
BLUE:0,
YELLOW:0

};

let path = [];

for(let i=1;i<=225;i++){

path.push(i);

}

function updateTokens(){

document.querySelectorAll(".token")
.forEach(t=>t.remove());

for(let player in positions){

let pos = positions[player];

if(pos>0 && pos<225){

const token =
document.createElement("div");

token.className = "token";

if(player=="RED"){

token.innerHTML = "🔴";

}

if(player=="GREEN"){

token.innerHTML = "🟢";

}

if(player=="BLUE"){

token.innerHTML = "🔵";

}

if(player=="YELLOW"){

token.innerHTML = "🟡";

}

board.children[pos-1]
.appendChild(token);

}

}

}

function nextTurn(){

if(currentPlayer=="RED"){

currentPlayer="GREEN";

}

else if(currentPlayer=="GREEN"){

currentPlayer="BLUE";

}

else if(currentPlayer=="BLUE"){

currentPlayer="YELLOW";

}

else{

currentPlayer="RED";

}

document.getElementById(
"turn"
).innerHTML = currentPlayer;

}

function rollDice(){

dice =
Math.floor(Math.random()*6)+1;

document.getElementById(
"dice"
).innerHTML = dice;

positions[currentPlayer] += dice;

if(positions[currentPlayer]>=225){

positions[currentPlayer]=225;

document.getElementById(
"winner"
).innerHTML =
"🏆 "+currentPlayer+" WINS";

}

updateTokens();

nextTurn();

}

updateTokens();

</script>

</body>

</html>
