<!DOCTYPE html>
<html>

<head>

<title>Real Custom Ludo</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#111;
font-family:Arial;
text-align:center;
color:white;
}

h1{
margin-top:20px;
font-size:40px;
}

.board{
width:360px;
height:360px;
margin:30px auto;
display:grid;
grid-template-columns:repeat(6,1fr);
grid-template-rows:repeat(6,1fr);
gap:2px;
background:white;
padding:5px;
border-radius:20px;
}

.cell{
background:#eee;
display:flex;
justify-content:center;
align-items:center;
font-size:25px;
font-weight:bold;
border-radius:8px;
}

.red{
background:red;
color:white;
}

.green{
background:green;
color:white;
}

.blue{
background:blue;
color:white;
}

.yellow{
background:gold;
color:black;
}

.path{
background:#ddd;
}

.center{
background:black;
color:white;
font-size:35px;
}

#dice{
font-size:70px;
margin-top:20px;
}

button{
margin-top:20px;
padding:18px 40px;
font-size:25px;
font-weight:bold;
border:none;
border-radius:20px;
background:#8a2cff;
color:white;
}

#winner{
font-size:35px;
margin-top:25px;
color:#00ff90;
}

</style>

</head>

<body>

<h1>

🎮 REAL LUDO

</h1>

<div class="board">

<div class="cell red">🔴</div>
<div class="cell red">🔴</div>
<div class="cell path" id="p1"></div>
<div class="cell path" id="p2"></div>
<div class="cell green">🟢</div>
<div class="cell green">🟢</div>

<div class="cell red">🔴</div>
<div class="cell red">🚗</div>
<div class="cell path" id="p3"></div>
<div class="cell path" id="p4"></div>
<div class="cell green">🟢</div>
<div class="cell green">🟢</div>

<div class="cell path" id="p5"></div>
<div class="cell path" id="p6"></div>
<div class="cell center">🎲</div>
<div class="cell path" id="p7"></div>
<div class="cell path" id="p8"></div>
<div class="cell path" id="p9"></div>

<div class="cell path" id="p10"></div>
<div class="cell path" id="p11"></div>
<div class="cell path" id="p12"></div>
<div class="cell path" id="p13"></div>
<div class="cell path" id="p14"></div>
<div class="cell path" id="p15"></div>

<div class="cell blue">🔵</div>
<div class="cell blue">🔵</div>
<div class="cell path" id="p16"></div>
<div class="cell path" id="p17"></div>
<div class="cell yellow">🟡</div>
<div class="cell yellow">🟡</div>

<div class="cell blue">🔵</div>
<div class="cell blue">🔵</div>
<div class="cell path" id="p18"></div>
<div class="cell path" id="p19"></div>
<div class="cell yellow">🟡</div>
<div class="cell yellow">🏆</div>

</div>

<div id="dice">

1

</div>

<button onclick="rollDice()">

ROLL DICE

</button>

<div id="winner">

</div>

<script>

let position = 1;

function rollDice(){

let dice =
Math.floor(Math.random()*6)+1;

document.getElementById(
"dice"
).innerHTML = dice;

if(document.getElementById(
"p"+position
)){

document.getElementById(
"p"+position
).innerHTML = "";

}

position += dice;

if(position >= 19){

position = 19;

document.getElementById(
"winner"
).innerHTML =
"🏆 YOU WIN";

}

if(document.getElementById(
"p"+position
)){

document.getElementById(
"p"+position
).innerHTML = "🚗";

}

}

document.getElementById(
"p1"
).innerHTML = "🚗";

</script>

</body>

</html>
