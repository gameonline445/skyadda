<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>REAL LUDO UPGRADE</title>

<style>

body{
margin:0;
background:#181818;
font-family:Arial;
text-align:center;
color:white;
overflow-x:hidden;
}

h1{
margin-top:15px;
font-size:38px;
}

.turn{
font-size:24px;
margin-top:10px;
}

.board{

width:390px;
height:390px;

margin:20px auto;

display:grid;

grid-template-columns:repeat(15,1fr);

grid-template-rows:repeat(15,1fr);

background:white;

border-radius:20px;

overflow:hidden;

border:5px solid #222;

}

.cell{

border:1px solid #ddd;

display:flex;

justify-content:center;

align-items:center;

position:relative;

font-size:15px;

font-weight:bold;

box-sizing:border-box;

}

.red-home{
background:#ff4d4d;
}

.green-home{
background:#33cc66;
}

.yellow-home{
background:#ffd633;
}

.blue-home{
background:#4d79ff;
}

.path{
background:white;
}

.safe{
background:#ddd;
}

.center{
background:black;
color:white;
font-size:24px;
}

.token{

width:18px;
height:18px;

border-radius:50%;

border:2px solid white;

position:absolute;

cursor:pointer;

}

.r{
background:red;
}

.g{
background:green;
}

.b{
background:blue;
}

.y{
background:gold;
}

#dice{
font-size:70px;
margin-top:15px;
}

button{

padding:18px 50px;

font-size:24px;

font-weight:bold;

border:none;

border-radius:20px;

background:#8a2cff;

color:white;

margin-top:20px;

}

#winner{

font-size:34px;

margin-top:20px;

color:#00ff90;

}

.info{

font-size:20px;

margin-top:10px;

}

</style>

</head>

<body>

<h1>

🎮 REAL LUDO UPGRADE

</h1>

<div class="turn">

TURN :
<span id="turnText">

RED

</span>

</div>

<div class="info">

⭐ Safe Boxes Enabled

</div>

<div class="board"
id="board">

</div>

<div id="dice">

⚀

</div>

<button onclick="rollDice()">

🎲 ROLL DICE

</button>

<div id="winner">

</div>

<script>

const board =
document.getElementById("board");

for(let i=0;i<225;i++){

const cell =
document.createElement("div");

cell.classList.add("cell");

let row =
Math.floor(i/15);

let col =
i%15;

if(row<6 && col<6){

cell.classList.add(
"red-home"
);

}

else if(row<6 && col>8){

cell.classList.add(
"green-home"
);

}

else if(row>8 && col<6){

cell.classList.add(
"blue-home"
);

}

else if(row>8 && col>8){

cell.classList.add(
"yellow-home"
);

}

else if(row==7 && col==7){

cell.classList.add(
"center"
);

cell.innerHTML="🏆";

}

else{

cell.classList.add(
"path"
);

}

board.appendChild(cell);

}

const cells =
document.querySelectorAll(".cell");

const safeSpots = [
6,38,68,98,128,166,196
];

safeSpots.forEach(i=>{

cells[i].classList.add(
"safe"
);

cells[i].innerHTML="⭐";

});

const path = [

6,7,8,23,38,53,68,83,98,113,128,127,
126,125,124,123,122,121,136,151,166,
181,196,211,212,213,214,215,216,217,
218,219,220,205,190,175,160,145,130,
115,100,85,70,55,40,25,10,9

];

const players = {

RED:[
{pos:-1,class:"r"},
{pos:-1,class:"r"},
{pos:-1,class:"r"},
{pos:-1,class:"r"}
],

GREEN:[
{pos:-1,class:"g"},
{pos:-1,class:"g"},
{pos:-1,class:"g"},
{pos:-1,class:"g"}
],

BLUE:[
{pos:-1,class:"b"},
{pos:-1,class:"b"},
{pos:-1,class:"b"},
{pos:-1,class:"b"}
],

YELLOW:[
{pos:-1,class:"y"},
{pos:-1,class:"y"},
{pos:-1,class:"y"},
{pos:-1,class:"y"}
]

};

const turns = [
"RED",
"GREEN",
"BLUE",
"YELLOW"
];

let currentTurn = 0;

function clearTokens(){

document.querySelectorAll(".token")
.forEach(t=>t.remove());

}

function drawTokens(){

clearTokens();

for(let player in players){

players[player].forEach(
(tokenData,index)=>{

if(
tokenData.pos>=0
&&
tokenData.pos<path.length
){

const token =
document.createElement("div");

token.classList.add(
"token"
);

token.classList.add(
tokenData.class
);

token.onclick=()=>{

moveToken(
player,
index
);

};

cells[
path[tokenData.pos]
].appendChild(token);

}

});

}

}

let currentDice = 0;

function nextTurn(){

currentTurn++;

if(currentTurn>=turns.length){

currentTurn=0;

}

document.getElementById(
"turnText"
).innerHTML =
turns[currentTurn];

}

function rollDice(){

const faces = [
"⚀","⚁","⚂","⚃","⚄","⚅"
];

currentDice =
Math.floor(Math.random()*6)+1;

document.getElementById(
"dice"
).innerHTML =
faces[currentDice-1];

}

function moveToken(player,index){

if(player!=turns[currentTurn]){

return;

}

let token =
players[player][index];

if(token.pos==-1){

if(currentDice==6){

token.pos=0;

}

else{

return;

}

}

else{

token.pos += currentDice;

if(token.pos>=path.length-1){

token.pos=
path.length-1;

document.getElementById(
"winner"
).innerHTML =
"🏆 "+player+" WINS";

}

}

killCheck(player,index);

drawTokens();

if(currentDice!=6){

nextTurn();

}

currentDice=0;

}

function killCheck(player,index){

let active =
players[player][index];

for(let p in players){

if(p!=player){

players[p].forEach(t=>{

if(
t.pos==
active.pos
&&
!safeSpots.includes(
path[t.pos]
)
&&
t.pos>0
){

t.pos=-1;

}

});

}

}

}

drawTokens();

</script>

</body>

</html>
