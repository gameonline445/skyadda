<!DOCTYPE html>
<html>

<head>

<title>Wallet</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
text-align:center;
}

.top{
background:black;
padding:20px;
font-size:35px;
font-weight:bold;
}

.box{
background:#1c1c1c;
margin:20px;
padding:25px;
border-radius:20px;
font-size:24px;
line-height:60px;
}

.btn{
display:block;
width:80%;
margin:20px auto;
padding:18px;
font-size:22px;
font-weight:bold;
border:none;
border-radius:15px;
background:#00cfff;
color:white;
text-decoration:none;
}

.history{
background:#1c1c1c;
margin:20px;
padding:20px;
border-radius:20px;
text-align:left;
}

.item{
background:#2b2b2b;
padding:15px;
margin-top:10px;
border-radius:12px;
font-size:22px;
}

</style>

</head>

<body>

<div class="top">

💰 MY WALLET

</div>

<div class="box">

💰 Wallet Balance :
₹<span id="wallet">0</span>

<br><br>

🏆 Winning Balance :
₹<span id="winning">0</span>

</div>

<div class="history">

<h2>🧾 Transaction History</h2>

<div class="item">

💵 Deposit ₹1000

</div>

<div class="item">

🏆 Winning ₹0

</div>

</div>

<a href="payment.html"
class="btn">

ADD MONEY

</a>

<a href="withdraw.html"
class="btn">

WITHDRAW

</a>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
getDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBNnnLu7HpCImLl5cIWKmB_eLjsbaR6zxg",

authDomain: "skyadda-1d849.firebaseapp.com",

projectId: "skyadda-1d849",

storageBucket: "skyadda-1d849.firebasestorage.app",

messagingSenderId: "929894889505",

appId: "1:929894889505:web:6e76e0eb701ffe89d60b60"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

async function loadWallet(){

const uid =
"AEp1CmD980TmxnrdCiCUVFC7WMB2";

const ref =
doc(db,"users",uid);

const snap =
await getDoc(ref);

if(snap.exists()){

const data =
snap.data();

document.getElementById("wallet")
.innerHTML =
data.money;

document.getElementById("winning")
.innerHTML =
data.winning;

}

}

loadWallet();

</script>

</body>

</html>
