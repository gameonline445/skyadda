<!DOCTYPE html>
<html>

<head>

<title>Wallet</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.top{
background:black;
padding:20px;
font-size:35px;
font-weight:bold;
}

.box{
background:#1e1e1e;
margin:20px;
padding:25px;
border-radius:20px;
font-size:24px;
line-height:50px;
}

</style>

</head>

<body>

<div class="top">

💰 MY WALLET

</div>

<div class="box">

💰 Wallet Balance :
₹<span id="wallet">

0

</span>

<br><br>

🏆 Winning Balance :
₹<span id="winning">

0

</span>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
getDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBNnnLu7HpCImLl5cIWKmB_eLjsbaR6zxg",

authDomain: "skyadda-1d849.firebaseapp.com",

projectId: "skyadda-1d849",

storageBucket: "skyadda-1d849.firebasestorage.app",

messagingSenderId: "929894889505",

appId: "1:929894889505:web:6e76e0eb701ffe89d60b60"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let uid =
localStorage.getItem("uid");

async function loadWallet(){

const ref =
doc(db,"users",uid);

const snap =
await getDoc(ref);

if(snap.exists()){

const data =
snap.data();

document.getElementById("wallet")
.innerHTML =
data.money || 0;

document.getElementById("winning")
.innerHTML =
data.winning || 0;

}

}

loadWallet();

</script>

</body>

</html>
