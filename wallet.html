<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "YOUR_API_KEY",

  authDomain: "skyadda-1d849.firebaseapp.com",

  projectId: "skyadda-1d849",

  storageBucket: "skyadda-1d849.appspot.com",

  messagingSenderId: "YOUR_SENDER_ID",

  appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const uid = localStorage.getItem("uid");

async function loadWallet() {

  if (!uid) {

    document.getElementById("walletBalance").innerText = "₹0";

    document.getElementById("winningBalance").innerText = "₹0";

    return;

  }

  const userRef = doc(db, "users", uid);

  const userSnap = await getDoc(userRef);

  if (userSnap.exists()) {

    const data = userSnap.data();

    document.getElementById("walletBalance").innerText =
      "₹" + (data.money || 0);

    document.getElementById("winningBalance").innerText =
      "₹" + (data.winning || 0);

  } else {

    document.getElementById("walletBalance").innerText = "₹0";

    document.getElementById("winningBalance").innerText = "₹0";

  }

}

loadWallet();

</script>
