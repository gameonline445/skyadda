<!DOCTYPE html>
<html>

<head>

<title>Withdraw</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

h1{
margin-top:30px;
font-size:40px;
}

.box{
background:#1e1e1e;
margin:30px;
padding:25px;
border-radius:20px;
}

input{
width:90%;
padding:18px;
font-size:22px;
margin-top:20px;
border:none;
border-radius:12px;
}

button{
padding:18px 35px;
font-size:24px;
margin-top:25px;
border:none;
border-radius:12px;
background:#00cfff;
color:white;
font-weight:bold;
}

#status{
margin-top:20px;
font-size:22px;
color:#00ff99;
}

</style>

</head>

<body>

<h1>💸 Withdraw Money</h1>

<div class="box">

<input
type="number"
id="amount"
placeholder="Enter Amount">

<input
type="text"
id="upi"
placeholder="Enter UPI ID">

<button onclick="sendWithdraw()">

SEND REQUEST

</button>

<div id="status"></div>

</div>

<script>

function sendWithdraw(){

let amount =
document.getElementById("amount").value;

let upi =
document.getElementById("upi").value;

if(amount == "" || upi == ""){

document.getElementById("status")
.innerHTML =
"❌ Fill All Fields";

return;

}

document.getElementById("status")
.innerHTML =
"✅ Withdraw Request Sent";

}

</script>

</body>

</html>
